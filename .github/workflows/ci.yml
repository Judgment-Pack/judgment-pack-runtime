name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} · Go ${{ matrix.go }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go: stable
          - os: ubuntu-latest
            go: 1.21.x
          - os: macos-latest
            go: stable
          - os: windows-latest
            go: stable
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Check formatting
        run: go fmt ./...
      - name: Verify formatting did not change files
        run: git diff --exit-code
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Run bundled conformance suite
        run: go run ./cmd/judgment-pack spec test-conformance --quiet
      - name: Build
        run: go build -trimpath ./cmd/judgment-pack
        env:
          CGO_ENABLED: "0"
